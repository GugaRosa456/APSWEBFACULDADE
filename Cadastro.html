<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Cadastro</title>
</head>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}
.background{
background-color: lightgray;
width: 100%;
height: 950px;
}

.box1{
         width: 900px;
        height: 550px;
        color: black;
        text-align: center;
        background: white;
        position: relative;
        border: 2px solid #333;
        top: 10px;
        left: 500px;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 2px 2px 5px rgb(0, 0, 0);
        border: none;
        border-radius: 15px;
        
}
.FonteNome{
    text-align: center;
   font-family: "Verdana", Sans-serif;
   font-size: 15px;
   color: black;
   position: relative;
   right: 140px;
}
.FonteSenha{
    text-align: center;
   font-family: "Verdana", Sans-serif;
   font-size: 15px;
   color: black;
   position: relative;
   right:  140px;
}
.FonteEmail{
    text-align: center;
   font-family: "Verdana", Sans-serif;
   font-size: 15px;
   color: black;
   position: relative;
   right: 140px;
}
.FonteConfirmarSenha{
    text-align: center;
   font-family: "Verdana", Sans-serif;
   font-size: 15px;
   color: black;
   position: relative;
   right: 100px;
}   
.FonteCep{
    text-align: center;
   font-family: "Verdana", Sans-serif;
   font-size: 15px;
   color: black;
   position: relative;
   right: 145px;
}
button{
    width: 175px;
    height: 40px;
    color: white;
    background-color:  tomato;
    border-radius:5px;
    border: none
}
input{
border-radius: 4px;
background-color: #CFECF3 ;
width: 325px;
height: 25px;
}
.titulo{
 position: relative;
 left: -390px;
 top: 10px;
 font-family: "Verdana", Sans-serif;
}
.itens{
    position: relative;
    top: -30px;
}
a{
    text-decoration: none;
    color: tomato;
    position: relative;
    right: -10px;
}
.topbar{
    width:100%;
    height:70px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:50px;
}

.topbar a{
    text-decoration:none;
    color:#333;
    font-weight:bold;
    transition:0.3s;
}

.topbar a:hover{
    color:#ff3b3b;
}
.logo{
    width:50px;
    height:50px;
    margin-right:40px;
      position: relative;
    left: -10px;
}

.logo img{
    width:80px;
    height:80px;
}
footer{
    background:#1f1f1f;
    color:white;
    padding:50px 20px;
    margin-top:50px;
}

.footer-container{
    max-width:1200px;
    margin:auto;
    display:flex;
    flex-wrap:wrap;
    gap:40px;
    justify-content:center;
    text-align:center;
}

.footer-box h2{
    margin-bottom:15px;
    color:#ff3b3b;
}

.footer-box p{
      color:#ccc;
    text-decoration:none;
    line-height:28px;
}
.footer-box a{
    color:#ccc;
    text-decoration:none;
    line-height:28px;
}

.footer-box a:hover{
    color:white;
}
</style>
<body>
    <header>
    <div class="topbar">
        <img class="logo" src="pokebola.png" alt="Pokebola">
         <a href="index.html">Inicio</a>
        <a>Decks</a>
        <a>Produtos</a>
        <a>Leilões</a>
        <a href="#">Sobre nós</a>
        <a href="Login.html">Login</a>
    </div>
</header>
    <div class="background">
    <div class="box1">
    <form method="post"  action="Login.html">
    <label for="criarConta" class="titulo">Criar Conta</label>
    <br>
    <br>
    <br>
    <div class="itens">
    <label for="Usuario" class="FonteNome">Nome</label>
    <br>
    <br>
    <input type="text" name="usuario" required>
    <br>
    <br>
    <label for="Email" class="FonteEmail">Email</label>
    <br>
    <br>
    <input type="email" name="email" required>
    <br>
    <br>    
    <label for="cep" name="cep" class="FonteCep" maxlength="8">CEP</label>
    <br>
    <br>        
    <input type="text" name="cep" required>
    <br>
    <br>  
    <label for="Senha" class="FonteSenha">Senha</label>
    <br>
    <br>
    <input type="password" name="senha" required maxlength="8">
    <br>
    <br>
    <label for="ConfirmarSenha" class="FonteConfirmarSenha">Confirmar Senha</label>
    <br>
    <br>
    <input type="password" name="confirmar_senha" required maxlength="8">
    <br>
    <br>
    <br>  
     <button type="submit">Criar Conta</button>
   </div>
    </form>
    </div>
    </div>
    <footer>
    <div class="footer-container">
        <div class="footer-box">
            <h2>Pokémon TCG</h2>
            <p>Seu site de cartas Pokémon.</p>
        </div>
        <div class="footer-box">
            <h2>Links</h2>
            <a href="#">Início</a><br>
            <a href="#">Produtos</a><br>
            <a href="#">Contato</a>
        </div>
        <div class="footer-box">
            <h2>Redes Sociais</h2>
            <p>Instagram</p>
            <p>Facebook</p>
            <p>Discord</p>
        </div>
    </div>
    <div class="copy">
        © 2026 Pokémon TCG - Todos os direitos reservados
    </div>
</footer>
</body>
</html>
